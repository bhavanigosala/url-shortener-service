spring.application.name=url-shortener-service
server.port=8080

#URL Shortener Configuration
url-shortener.base-url=http://localhost:8080/s
url-shortener.max-short-code-length=7

# Logging Configuration
logging.level.root=INFO
logging.level.com.urlshortener=DEBUG
logging.level.org.springframework.web=INFO

# Database Configuration (H2 in-memory for development)
spring.datasource.url=jdbc:h2:mem:urlshortener
spring.datasource.driverClassName=org.h2.Driver
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Async/Virtual Threads Configuration
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.instances.urlShortener.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.urlShortener.wait-duration-in-open-state=30000
resilience4j.circuitbreaker.instances.urlShortener.slow-call-duration-threshold=5000

resilience4j.circuitbreaker.instances.urlResolver.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.urlResolver.wait-duration-in-open-state=30000

# Retry Configuration
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=1000
resilience4j.retry.instances.urlShortener.max-attempts=3
resilience4j.retry.instances.urlShortener.wait-duration=1000

# Rate Limiter Configuration
resilience4j.ratelimiter.configs.default.register-health-indicator=false
resilience4j.ratelimiter.instances.urlShortener.limit-for-period=100
resilience4j.ratelimiter.instances.urlShortener.limit-refresh-period=1m

# Server Configuration
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# Timezone Configuration
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null
